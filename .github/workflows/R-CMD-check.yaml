# Continuous Integration for pakhom
# Runs R CMD check and tests on every push and pull request.
# R release on macOS, Ubuntu, and Windows, plus R-devel and R-oldrel on Ubuntu
# (devel catches upcoming-R breakage; oldrel exercises the declared R >= 4.1.0 floor).

name: R-CMD-check

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # No API keys in CI. The tests that touch a provider either mock it
      # (testthat::local_mocked_bindings) or set their own ephemeral key via
      # withr/Sys.setenv; everything else skips gracefully when no key is
      # present (verified: a key-less R CMD check is 0E/0W). Injecting a fake
      # key here made key-presence-guarded tests attempt LIVE API calls, which
      # the real endpoints reject -> reported as ERRORs (the previous red CI).

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          error-on: '"error"'
          args: 'c("--no-manual", "--as-cran")'
