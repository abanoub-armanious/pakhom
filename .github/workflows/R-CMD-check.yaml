# Continuous Integration for pakhom
# Runs R CMD check and tests across platforms and R versions.
#
# Cost-aware matrix:
#   - Branch pushes run Linux (R-devel / release / oldrel-1) + Windows -- the
#     platforms NOT exercised during local development. Linux is CRAN's primary
#     check platform; Windows is never run on the author's machine, and both
#     have surfaced real platform-specific bugs here before.
#   - macOS (which bills at a 10x runner multiplier and is already covered by the
#     author's local R CMD check on every change) is added only on pull requests
#     and release tags, where CRAN-platform parity matters most.
#   - Documentation-only commits (markdown, bibliography, licence, gitignore)
#     skip CI entirely via paths-ignore.

name: R-CMD-check

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - '**.bib'
      - 'LICENSE*'
      - '.gitignore'
  pull_request:
    branches: [main, master, develop]

jobs:
  # Decide the platform matrix from the triggering event. Full matrix (incl.
  # macOS) on pull requests and release tags; the fast lane on branch pushes.
  configure:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        run: |
          fast='{"os":"windows-latest","r":"release"},{"os":"ubuntu-latest","r":"devel","http-user-agent":"release"},{"os":"ubuntu-latest","r":"release"},{"os":"ubuntu-latest","r":"oldrel-1"}'
          mac='{"os":"macos-latest","r":"release"},'
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ] || [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            echo "matrix={\"config\":[$mac$fast]}" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"config\":[$fast]}" >> "$GITHUB_OUTPUT"
          fi

  R-CMD-check:
    needs: configure
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.configure.outputs.matrix) }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # No API keys in CI. The tests that touch a provider either mock it
      # (testthat::local_mocked_bindings) or set their own ephemeral key via
      # withr/Sys.setenv; everything else skips gracefully when no key is
      # present (verified: a key-less R CMD check is 0E/0W). Injecting a fake
      # key here made key-presence-guarded tests attempt LIVE API calls, which
      # the real endpoints reject -> reported as ERRORs (the previous red CI).

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # The development pak is built against R-devel; the released pak
          # binary is often absent there, which previously failed the R-devel
          # job with "there is no package called 'pak'". It is backward-
          # compatible for the release/oldrel jobs.
          pak-version: devel
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          error-on: '"error"'
          args: 'c("--no-manual", "--as-cran")'
