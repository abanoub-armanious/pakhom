    contents:
      - init_live_tracker
      - live_record_assignment
      - live_record_clustering_pass
      - live_snapshot_codebook
      - live_snapshot_clusters

  - title: "Statistical Analysis"
    desc: "Correlation and co-occurrence helpers"
    contents:
