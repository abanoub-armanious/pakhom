url: ~

template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: "#2c3e50"

# Author profile links (preferred over an after_body JS hack -- pkgdown
# renders these into the author footer on every page natively, so the link
# is server-rendered (no flicker) and survives any future pkgdown markup
# changes.)
authors:
  Abanoub J. Armanious:
    href: https://www.linkedin.com/in/abanoubarmanious/

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, linkedin, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/abanoub-armanious/pakhom
      aria-label: GitHub
    linkedin:
      icon: fa-linkedin
      href: https://www.linkedin.com/in/abanoubarmanious/
      aria-label: LinkedIn

home:
  title: "pakhom: AI-Integrated Reflexive Thematic Analysis"
  description: >
    An R package that automates Braun & Clarke reflexive thematic analysis
    using OpenAI or Anthropic APIs. Supports learning from prior manual
    studies, checkpoint/resume, researcher review points, and
    publication-quality HTML reports.

reference:
  - title: "Run an Analysis"
    desc: "Core entry points for running the pipeline"
    contents:
      - run_analysis
      - load_config
      - create_config
      - config_wizard
      - config_wizard_app

  - title: "Configuration"
    desc: "Configuration creation, validation, and defaults"
    contents:
      - default_config

  - title: "Data Loading & Exploration"
    desc: "Load data from SQLite and explore databases"
    contents:
      - load_data
      - explore_database
      - detect_variable_types

  - title: "AI Provider"
    desc: "AI provider abstraction for OpenAI and Anthropic"
    contents:
      - create_ai_provider

  - title: "Pipeline Steps"
    desc: "Individual analysis steps (called by run_analysis)"
    contents:
      - run_progressive_coding
      - create_coding_state
      - get_analytic_sample
      - analyze_sentiment
      - generate_themes_iterative
      - cascade_theme_assignments
      - enrich_themes
      - calculate_correlations

  - title: "Themes & Theme Data"
    desc: "Working with ThemeSet objects"
    contents:
