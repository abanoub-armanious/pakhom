url: https://abanoub-armanious.github.io/pakhom/

template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: "#2c3e50"

# Author profile links (preferred over an after_body JS hack -- pkgdown
# renders these into the author footer on every page natively, so the link
# is server-rendered (no flicker) and survives any future pkgdown markup
# changes.)
authors:
  Abanoub J. Armanious:
    href: https://www.linkedin.com/in/abanoubarmanious/

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, linkedin, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/abanoub-armanious/pakhom
      aria-label: GitHub
    linkedin:
      icon: fa-linkedin
      href: https://www.linkedin.com/in/abanoubarmanious/
      aria-label: LinkedIn

home:
  title: "pakhom: AI-Assisted Thematic Analysis with Methodology-as-Architecture"
  description: >
    An R package for AI-assisted thematic analysis in three
    methodologically-distinct modes (reflexive, codebook, framework) using
    OpenAI or Anthropic APIs. Supports learning from prior manual studies,
    checkpoint/resume, researcher review points, and publication-quality
    HTML reports.

reference:
  - title: "Run an Analysis"
    desc: >
      Top-level entry points. run_analysis() drives Modes 2 + 3 (data ->
      coding -> sentiment -> themes -> correlations -> report ->
      finalize_run). run_mode1() drives Mode 1 (Reflexive Scaffold)
      with the same Tier-0 / Tier-1 scaffolding but routes through
      the provocateur loop. Both produce a finalized run directory
      with full audit trail and HTML report.
    contents:
      - run_analysis
      - run_mode1
      - load_config
      - create_config
      - config_wizard
      - config_wizard_app

  - title: "Methodology Modes (Sprint-4)"
    desc: >
      The three methodologically-distinct operating modes, the framework
      spec module (Mode 3), the provocateur loop (Mode 1), and the
      reflexive memo CRUD (Mode 1 burden parity per AC6).
    contents:
      - run_provocateur_questioning
      - load_framework_spec
      - list_builtin_frameworks
      - archive_framework_spec
      - framework_prompt_block
      - apply_framework_themes
      - make_memo
      - add_memo
      - read_memo
      - list_memos
      - persist_memos
      - load_memos
      - memo_to_markdown
      - markdown_to_memo
      - create_reflection_log
      - make_provocation
      - provoke_counter_narrative
      - provoke_disconfirming_evidence
      - provoke_alternative_interpretation
      - provoke_absent_voice
      - provoke_assumption_surfacing

  - title: "Tier-0 Transparency (T0.1 / T0.2 / T0.3)"
    desc: >
      Quote provenance + verification ladder (T0.1), participant spread
      per theme (T0.2 -- computed inside aggregate_theme_statistics),
      and corpus coverage / no-silent-skip (T0.3). The render_tier0_coverage_card
      generic dispatches on a virtual Tier0Coverage parent class shared
      by CorpusCoverage (Mode 2/3) and ProvocationCoverage (Mode 1).
    contents:
      - make_quote
      - verify_quote
      - quote_provenance_summary
      - compute_quote_provenance_stats
      - compute_corpus_coverage
      - compute_mode1_coverage
      - compute_mode1_theme_stats
      - compute_provocation_provenance_stats
      - render_tier0_coverage_card
      - init_fabrication_log
      - log_fabrication
      - make_quote_from_citation
      - make_quotes_from_citations
      - verify_quotes
      - write_corpus_coverage

  - title: "Methodological Transparency Report (OS.6)"
    desc: >
      Phase 58 Stage 1A: self-contained HTML methodological transparency
      report bundling Lincoln & Guba (1985) trustworthiness mapping,
      reflexivity completeness, T0.1 quote provenance summary, T0.3
      corpus coverage funnel, AC9 audit log summary, and theme set
      summary. Reads disk artifacts only; never re-runs the pipeline.
    contents:
      - bundle_transparency_report

  - title: "Methodology Decision Aids"
    desc: >
      User-facing helpers for choosing a methodology mode and for
      annotating plots / reports with the mode and provenance evidence.
    contents:
      - methodology_decision_aid
      - configuration_selection_aid
      - methodology_plot_caption

  - title: "Run State + Soft-Lock (T1.5)"
    desc: >
      The REDCap dev/production pattern: every run lives in active or
      finalized state; methodology cannot silently change between
      states. Fork a run via clone_run_with_new_mode().
    contents:
      - init_run_state
      - read_run_metadata
      - is_run_finalized
      - finalize_run
      - methodology_mismatch_status
      - clone_run_with_new_mode

  - title: "Output Stamping (T1.7 / AC4)"
    desc: >
      Methodology stamping helpers. Every CSV / JSON / HTML / plot
      produced by a run carries the mode + run id stamp so a reviewer
      reading any artifact alone sees the methodology declaration.
    contents:
      - stamp_methodology_html
      - stamp_methodology_csv
      - stamp_methodology_json
      - stamp_methodology_console
      - methodology_label
      - methodology_short_code
      - methodology_description_short
      - run_id_with_mode

  - title: "Methodology Rules (T1.6 / AC9)"
    desc: >
      Lin & Corley (2025) pattern: methodology rules generated from
      config and injected into the model context every turn.
    contents:
      - generate_methodology_rules
      - write_methodology_rules

  - title: "S3 Print Methods"
    desc: >
      print() dispatchers for the package's S3 classes. Each is invoked
      automatically when you print(x) an object of the corresponding class;
      they are documented here for reference.
    contents:
      - print.AIProvider
      - print.CheckpointManager
      - print.Code
      - print.ComparisonResult
      - print.CorpusCoverage
      - print.FrameworkSpec
      - print.LiveTracker
      - print.Memo
      - print.Provocation
      - print.ProvocationCoverage
      - print.QuoteProvenance
      - print.ResearcherReflectionLog
      - print.ResponseCache
      - print.Subtheme
      - print.ThematicConfig
      - print.ThemeSet

  - title: "Internal Helpers"
    desc: >
      Documented internal helpers used by the pipeline. Listed for
      completeness; not part of the user-facing API and may change without
      notice.
    contents:
      - detect_columns
      - export_theme_entry_csvs
      - generate_ai_synthesis
      - generate_downloads_section
      - generate_insights
      - generate_run_id
      - generate_theme_detail_section
      - get_emotion_interpretation
      - hash_config
      - load_and_combine_tables
      - make_anchor_id
      - make_safe_filename
      - parse_json_safely
      - parse_raw_data_files
      - preprocess_text
      - standardize_data
      - truncate_text
      - validate_config
      - .LIVE_CODEBOOK_SNAPSHOT_EVERY
      - .THEME_DEFAULTS
      - .THEME_REQUIRED_FIELDS

  - title: "Configuration"
    desc: "Configuration creation, validation, and defaults"
    contents:
      - default_config
      - validate_methodology_mode

  - title: "Data Loading & Exploration"
    desc: "Load data from SQLite and explore databases"
    contents:
      - load_data
      - load_corpus_from_config
      - explore_database
      - detect_variable_types

  - title: "AI Provider"
    desc: "AI provider abstraction for OpenAI and Anthropic"
    contents:
      - create_ai_provider
      - cache_response
      - init_response_cache
      - read_cached_response

  - title: "Pipeline Steps"
    desc: "Individual analysis steps (called by run_analysis)"
    contents:
      - run_progressive_coding
      - create_coding_state
      - get_analytic_sample
      - analyze_sentiment
      - generate_themes_iterative
      - cascade_theme_assignments
      - enrich_themes
      - calculate_correlations

  - title: "Themes & Theme Data"
    desc: "Working with ThemeSet objects and Code / Subtheme accessors"
    contents:
      - create_theme_set
      - create_code_object
      - create_subtheme
      - theme_names
      - n_themes
      - theme_set_to_tibble
      - normalize_theme_result
      - prune_empty_themes
      - theme_codes
      - theme_code_keys
      - theme_code_objects
      - theme_segments
      - theme_n_subthemes
      - theme_n_subthemes_total
      - subtheme_code_names
      - subtheme_code_keys
      - subtheme_n_codes
      - subtheme_n_codes_total
      - subtheme_n_subthemes

  - title: "Checkpoint & Resume"
    desc: "Save and restore pipeline progress"
    contents:
      - init_checkpoints
      - save_checkpoint
      - save_partial_checkpoint
      - load_checkpoint
      - list_checkpoints
      - find_latest_run
      - find_resume_point

  - title: "Manuscript Learning"
    desc: "Learn from prior manual thematic analyses"
    contents:
      - load_previous_studies
      - generate_learning_context
      - generate_learning_reflection
      - discover_study_folders
      - extract_manuscript_sections
      - parse_manuscript

  - title: "Human Verification"
    desc: "Inter-rater reliability and code verification"
    contents:
      - run_human_verification
      - verify_excerpts

  - title: "Report & Export"
    desc: "HTML report, CSV/JSON exports, and QDA-software interoperability"
    contents:
